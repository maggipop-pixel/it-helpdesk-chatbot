<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0f1e;
            --accent: #2563eb;
            --accent-bright: #3b82f6;
            --surface: rgba(15, 23, 42, 0.85);
            --surface-border: rgba(59, 130, 246, 0.12);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --user-bubble: linear-gradient(145deg, #2563eb 0%, #1d4ed8 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle dot grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* Soft vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(37, 99, 235, 0.15), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        .app-header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(145deg, var(--accent-bright), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
        }

        .brand-mark svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .brand-title {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f8fafc;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .status-dot {
            color: #22c55e;
            font-size: 0.65rem;
            line-height: 1;
            animation: pulse-soft 2.5s ease-in-out infinite;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        .main-area {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: stretch;
            padding: 1.5rem 1rem 1.25rem;
            min-height: 0;
        }

        .chatbot-window {
            width: 100%;
            max-width: 800px;
            flex: 1;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 24px 48px -12px rgba(0, 0, 0, 0.45),
                0 0 80px -20px rgba(37, 99, 235, 0.15);
            overflow: hidden;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .chatbot-messages {
            flex: 1;
            padding: 1.25rem 1.25rem 1rem;
            overflow-y: auto;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.35) transparent;
        }

        .chatbot-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chatbot-messages::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.35);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 78%;
            padding: 0.75rem 1rem;
            border-radius: 14px;
            font-size: 0.9375rem;
            line-height: 1.55;
        }

        .message.bot .message-content {
            background: rgba(15, 23, 42, 0.95);
            color: var(--text);
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .message.user .message-content {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }

        .timestamp {
            font-size: 0.6875rem;
            color: rgba(148, 163, 184, 0.85);
            margin-top: 0.375rem;
            text-align: right;
        }

        .message.user .timestamp {
            color: rgba(255, 255, 255, 0.65);
        }

        .welcome-message {
            background: rgba(37, 99, 235, 0.08);
            padding: 1rem 1.125rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            border: 1px solid rgba(59, 130, 246, 0.18);
            border-left: 3px solid var(--accent-bright);
        }

        .welcome-text {
            color: #cbd5e1;
            font-size: 0.9375rem;
            line-height: 1.65;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .typing-indicator {
            display: none;
            padding: 0.875rem 1.125rem;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            height: 7px;
            width: 7px;
            background: var(--accent-bright);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: typing 1.35s ease-in-out infinite;
            opacity: 0.85;
        }

        .typing-indicator span:nth-child(3) {
            margin-right: 0;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.45;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .chatbot-input {
            padding: 1rem 1.25rem;
            background: rgba(8, 12, 24, 0.65);
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .chatbot-input input {
            flex: 1;
            padding: 0.75rem 1.125rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            font-size: 0.9375rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
        }

        .chatbot-input input::placeholder {
            color: #64748b;
        }

        .chatbot-input input:focus {
            border-color: rgba(59, 130, 246, 0.45);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .send-btn {
            flex-shrink: 0;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(145deg, var(--accent-bright), var(--accent));
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }

        .send-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 640px) {
            .app-header {
                padding: 0.875rem 1rem;
            }

            .brand-title {
                font-size: 1rem;
            }

            .main-area {
                padding: 1rem 0.75rem 1rem;
            }

            .chatbot-window {
                border-radius: 12px;
                min-height: 360px;
            }

            .message-content {
                max-width: 88%;
            }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                </svg>
            </div>
            <span class="brand-title">IT Helpdesk AI</span>
        </div>
        <div class="status-pill" role="status">
            <span class="status-dot" aria-hidden="true">●</span>
            <span>Online</span>
        </div>
    </header>

    <main class="main-area">
        <div class="chatbot-window active" id="chatbotWindow">
            <div class="chatbot-messages" id="messagesArea">
                <div class="welcome-message">
                    <p class="welcome-text">Hi! I'm your IT support assistant. How can I help you today?</p>
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <div class="chatbot-input">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message..."
                    autocomplete="off"
                >
                <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Preserved for existing script listeners (hidden) -->
    <button type="button" id="chatbotToggle" hidden aria-hidden="true" tabindex="-1"></button>
    <button type="button" id="closeBtn" hidden aria-hidden="true" tabindex="-1">×</button>

    <script>
        // Elements
        const toggleBtn = document.getElementById('chatbotToggle');
        const closeBtn = document.getElementById('closeBtn');
        const chatWindow = document.getElementById('chatbotWindow');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Toggle chat window
        toggleBtn.addEventListener('click', () => {
            chatWindow.classList.add('active');
            messageInput.focus();
        });

        closeBtn.addEventListener('click', () => {
            chatWindow.classList.remove('active');
        });

        // Send message function
        function sendMessage() {
            const message = messageInput.value.trim();
            
            if (message === '') return;

            // Add user message
            addMessage(message, 'user');
            
            // Clear input
            messageInput.value = '';

            // Show typing indicator
            typingIndicator.classList.add('active');
            scrollToBottom();

            // Call Make.com webhook
fetch('https://hook.us2.make.com/tpeuxt2ne3nf4o3d1e1mkj2y1ew437id', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: message })
})
.then(response => response.text())
.then(data => {
    typingIndicator.classList.remove('active');
    addMessage(data, 'bot');
    scrollToBottom();
})
.catch(error => {
    typingIndicator.classList.remove('active');
    addMessage('Sorry, I could not connect to the server. Please try again.', 'bot');
    scrollToBottom();
});
        }

        // Add message to chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const now = new Date();
            const time = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text}
                    <div class="timestamp">${time}</div>
                </div>
            `;
            
            messagesArea.insertBefore(messageDiv, typingIndicator);
        }

        // Scroll to bottom
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        // Enter key to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Disable send button when input is empty
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim() === '';
        });

        // Initial state
        sendBtn.disabled = true;
    </script>

</body>
</html>
